<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffins Robert Maina | CPA | aspiring MP - Kitutu Chache North</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a5f2a;
            --primary-dark: #0f3d1a;
            --primary-light: #2d7a3f;
            --secondary: #c9a227;
            --secondary-light: #dbb84d;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --white: #ffffff;
            --gray: #6c757d;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            line-height: 1.7;
            color: var(--dark);
            background: var(--light);
            overflow-x: hidden;
        }
        
        /* Header */
        header {
            background: rgba(26, 95, 42, 0.98);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 30px rgba(0,0,0,0.15);
            transition: var(--transition);
        }
        
        header.scrolled {
            padding: 0.7rem 0;
            box-shadow: 0 5px 30px rgba(0,0,0,0.2);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Playfair Display', serif;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-weight: bold;
            font-size: 1rem;
        }
        
        .logo span {
            color: var(--secondary);
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
            align-items: center;
        }
        
        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
            padding: 5px 0;
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: var(--transition);
        }
        
        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }
        
        nav a:hover {
            color: var(--secondary);
        }
        
        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }
        
        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--white);
            border-radius: 3px;
            transition: var(--transition);
        }
        
        /* Hero Section */
        .hero {
            margin-top: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(26,95,42,0.92) 0%, rgba(15,61,26,0.95) 100%),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(201,162,39,0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(45,122,63,0.2) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(5deg); }
        }
        
        .hero-content {
            text-align: center;
            color: var(--white);
            z-index: 1;
            max-width: 900px;
            padding: 0 20px;
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero-badge {
            display: inline-block;
            background: rgba(201,162,39,0.2);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        
        .hero .subtitle {
            font-size: 1.8rem;
            color: var(--secondary);
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .hero .tagline {
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 40px;
            opacity: 0.95;
            line-height: 1.8;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: var(--secondary);
            color: var(--dark);
            box-shadow: 0 10px 30px rgba(201,162,39,0.3);
        }
        
        .btn-primary:hover {
            background: var(--secondary-light);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(201,162,39,0.4);
        }
        
        .btn-outline {
            border: 2px solid rgba(255,255,255,0.5);
            color: var(--white);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        
        .btn-outline:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-3px);
        }
        
        /* Stats Section */
        .stats-section {
            background: var(--primary);
            padding: 60px 20px;
        }
        
        .stats-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            text-align: center;
        }
        
        .stat-item {
            color: var(--white);
        }
        
        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--secondary);
            display: block;
        }
        
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        /* Sections */
        section {
            padding: 100px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: var(--primary);
            position: relative;
            display: inline-block;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--secondary);
            border-radius: 2px;
        }
        
        .section-subtitle {
            font-size: 1.15rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* About */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 80px;
            align-items: center;
        }
        
        .about-image-wrapper {
            position: relative;
        }
        
        .about-image {
            width: 100%;
            height: 550px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
        }
        
        .about-image::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        
        .about-image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .about-image-placeholder .initial {
            font-family: 'Playfair Display', serif;
            font-size: 12rem;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .about-image-placeholder .name-label {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-top: 15px;
            font-weight: 500;
        }
        
        .about-image-accent {
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: var(--secondary);
            border-radius: 30px;
            z-index: -1;
            opacity: 0.3;
        }
        
        .about-text h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: var(--primary);
        }
        
        .about-text p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
        }
        
        .credentials {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 35px;
        }
        
        .credential {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .credential:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(26,95,42,0.3);
        }
        
        /* Vision */
        .vision-section {
            background: var(--white);
            padding: 100px 30px;
        }
        
        .vision-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        .vision-quote {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            line-height: 1.7;
            color: var(--dark);
            font-style: italic;
            position: relative;
            padding: 40px 0;
        }
        
        .vision-quote::before {
            content: '"';
            font-size: 8rem;
            color: var(--secondary);
            opacity: 0.2;
            position: absolute;
            top: -20px;
            left: -20px;
            font-family: Georgia, serif;
        }
        
        .vision-author {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .vision-author-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .vision-author-info strong {
            display: block;
            color: var(--primary);
            font-size: 1.1rem;
        }
        
        .vision-author-info span {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        /* Priorities */
        .priorities-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 35px;
        }
        
        .priority-card {
            background: var(--white);
            padding: 45px 35px;
            border-radius: 25px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .priority-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition);
        }
        
        .priority-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }
        
        .priority-card:hover::before {
            transform: scaleX(1);
        }
        
        .priority-icon {
